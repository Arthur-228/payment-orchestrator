services:
  postgres:
    image: postgres:15-alpine
    container_name: conductor-postgres
    restart: always
    environment:
      POSTGRES_DB: conductor_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: conductor-redis
    restart: always
    ports:
      - "6379:6379"

  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:v23.3.10
    container_name: conductor-redpanda
    restart: always
    ports:
      - "9092:9092"
      - "9644:9644"   # для мониторинга
    command:
      - redpanda
      - start
      - --smp 1
      - --overprovisioned
      - --node-id 0
      - --kafka-addr PLAINTEXT://0.0.0.0:9092
      - --advertise-kafka-addr localhost:9092
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health | grep -E 'Healthy.*true'"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  postgres_data: